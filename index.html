<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的恋爱时光书架 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="https://fav.farm/💖">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #fff4f6;          
  --bg2: #ffe5e9;         
  --card: #ffffff;        
  --border: rgba(255, 182, 193, 0.4);      
  --border2: #ffb3be;     
  --text: #3c2f31;        
  --text2: #755e61;       
  --text3: #c2b0b2;       
  --accent: #ff597b;      
  --accent2: #ff8e9e;     
  --danger: #eb4d4d;      
  --shadow: 0 6px 16px rgba(255, 89, 123, 0.04), 0 12px 24px rgba(255, 89, 123, 0.06);
  --shadow2: 0 16px 32px rgba(255, 89, 123, 0.12), 0 24px 48px rgba(255, 89, 123, 0.16);
  --radius: 16px;
  --radius-sm: 10px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* 微流控隐藏式滚动条 */
::-webkit-scrollbar {width: 5px; height: 5px;}
::-webkit-scrollbar-track {background: transparent;}
::-webkit-scrollbar-thumb {background: rgba(255, 89, 123, 0.25); border-radius: 10px;}
::-webkit-scrollbar-thumb:hover {background: var(--accent);}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:0 4px 20px rgba(255,89,123,0.02)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{font-size:24px; filter: drop-shadow(0 4px 6px rgba(255,89,123,0.25))}
.logo-text h1{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;letter-spacing:0.08em;color:var(--accent)}
.logo-text p{font-size:11px;color:var(--text2);margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:#5cb85c;box-shadow:0 0 8px #5cb85c}.sync-dot.err{background:var(--danger);box-shadow:0 0 8px var(--danger)}.sync-dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.btn{border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);font-family:'Noto Sans SC',sans-serif;background:var(--card);font-weight:500;}
.btn:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent;box-shadow: 0 4px 12px rgba(255,89,123,0.35)}
.btn-primary:hover{background:#ff3d63;color:#fff;}

/* TOOLBAR */
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;gap:10px;align-items:center;justify-content:space-between}
.search-wrap{position:relative;width:280px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--accent2);pointer-events:none;width:14px;height:14px}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px;background:var(--bg);color:var(--text);transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow: 0 0 0 3px rgba(255,89,123,0.08)}

/* ===== 3D 书架主大厅 ===== */
.content{padding:30px 28px;max-width:1240px;margin:0 auto}
.shelf-section{margin-bottom:45px}
.shelf-title{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:26px;display:flex;align-items:center;gap:10px;letter-spacing:0.04em}
.shelf-title span{font-size:11px;font-weight:500;color:var(--accent);background:var(--bg2);padding:3px 10px;border-radius:20px;}

/* 精致红橡木书架线板 */
.grid-books{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:25px 28px;padding-bottom:20px;border-bottom: 4px solid #f7c3cb;box-shadow: 0 12px 16px -12px rgba(255,89,123,0.15);border-radius: 2px;}

/* 精美立体小书本卡片 */
.book-container {perspective: 1000px;width: 135px;height: 245px;margin: 0 auto;cursor: pointer;position: relative;}
.book-3d {
  width: 100%;height: 100%;position: relative;transform-style: preserve-3d;
  transform: rotateY(-10deg) translateZ(0);transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .book-3d {
  transform: rotateY(-22deg) rotateX(4deg) translateZ(12px);
}

.b-face {position: absolute;border-radius: 4px 8px 8px 4px;}

/* 上半照片壁面 */
.b-cover-top {
  position: absolute;top: 0;left: 0;width: 100%;height: 165px;
  z-index: 5;overflow: hidden;border-radius: 5px 8px 0 0;
  box-shadow: var(--shadow);border: 1px solid rgba(255,255,255,0.4);
  border-bottom: none;transform: translateZ(2px);
}
.b-cover-img-bg {
  width: 100%;height: 100%;object-fit: cover;
  filter: brightness(0.9) contrast(1.02);transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .b-cover-img-bg { transform: scale(1.08); }
.b-cover-top.no-photo-bg { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

.b-cover-tag-badge {
  position: absolute; top: 10px; left: 10px; z-index: 6;
  font-size: 9.5px; font-weight: 500; color: #fff;
  background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(6px); 
  padding: 2px 7px; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.2);
  max-width: 85%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* 下半标题白底纸区 */
.b-cover-bottom {
  position: absolute;top: 165px;left: 0;width: 100%;height: 80px;
  background: #ffffff;z-index: 5;padding: 10px 10px 8px;
  border: 1px solid var(--border);border-top: none;
  border-radius: 0 0 8px 4px;
  box-shadow: 0 8px 20px rgba(44,36,37,0.05);
  display: flex;flex-direction: column;justify-content: space-between;
  transform: translateZ(2px);
}
.b-cover-title {
  font-family:'Noto Serif SC',serif;font-size:12.5px;font-weight:700;color:var(--text);
  line-height: 1.4;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.b-cover-footer {
  font-size: 9.5px;color:var(--text2);opacity:0.75;
  display:flex;justify-content:space-between;align-items:center;
  border-top: 1px dashed rgba(255, 182, 193, 0.5);padding-top:5px;margin-top:2px;
}

.b-spine { position: absolute; top: 0; bottom: 0; width: 6px; left: -3px; transform: rotateY(-90deg) translateZ(0); background: #e04b6b; z-index: 4; border-radius: 3px 0 0 3px; }
.b-page-stack { position: absolute; inset: 0; background: #fffdfa; transform: translateZ(-2px); z-index: 3; border-radius: 4px 8px 8px 4px; }

/* 悬浮气泡功能键 */
.book-actions {
  position: absolute; top: 120px; right: 8px; z-index: 15;
  display: flex; gap: 4px; opacity: 0; transform: translateY(6px);
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .book-actions { opacity: 1; transform: translateY(0); }

.action-btn-sm {
  background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,107,139,0.15); cursor: pointer; font-size: 11px;
  padding: 4px 8px; border-radius: 6px; color: var(--text); font-weight: 500;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s;
}
.action-btn-sm:hover { background: var(--accent); color: #fff; border-color: transparent; transform: scale(1.05); }
.action-btn-sm.btn-del:hover { background: var(--danger); }

/* 空提示 */
.empty-state{text-align:center;padding:120px 24px;color:var(--text3);max-width:600px;margin:0 auto;}
.empty-icon{font-size:64px;margin-bottom:20px;animation: heartBeat 2s infinite alternate}
@keyframes heartBeat { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
.empty-state p{font-size:15px;color:var(--text2);margin-bottom:26px;font-family:'Noto Serif SC',serif;}

/* ===== 沉浸式宽大硬壳 3D 翻书层 ===== */
.book-overlay{position:fixed;inset:0;background:rgba(34,25,26,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(10px)}
.book-header{position:absolute;top:0;left:0;right:0;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;color:#fff}
.book-header-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;letter-spacing:0.04em}
.book-close{background:none;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.8);border-radius:var(--radius-sm);padding:6px 16px;cursor:pointer;font-size:13px;transition:all 0.25s}
.book-close:hover{background:var(--accent);border-color:transparent;color:#fff}

/* 黄金大相册专属独立高挑舞台高度 */
.book-scene3d { perspective: 2200px; width: min(860px, 95vw); height: 530px; display: flex; align-items: center; justify-content: center; }
.real-book { width: 50%; height: 100%; position: relative; transform-style: preserve-3d; transform: translateX(50%); transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
.real-book.is-opened { transform: translateX(0); }

.paper-page { position: absolute; inset: 0; transform-origin: left center; transform-style: preserve-3d; transition: transform 0.85s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10; pointer-events: none; }
.paper-page.active-flip { pointer-events: auto; }

.page-face { position: absolute; inset: 0; backface-visibility: hidden; background: #ffffff; box-shadow: inset 4px 0 30px rgba(0,0,0,0.03); display: flex; flex-direction: column; overflow: hidden; }
.page-face.face-back { transform: rotateY(180deg); background: #fffefe; box-shadow: inset -4px 0 30px rgba(0,0,0,0.03); border-right: 1px solid #ffdcd0; }
.paper-page.flipped { transform: rotateY(-180deg); }

/* 书内页图文排版 */
.p-inner {flex:1;padding:36px 32px;display:flex;flex-direction:column;position:relative;height:100%}
.p-img{width:100%;height:240px;object-fit:cover;border-radius:10px;margin-bottom:18px;flex-shrink:0;box-shadow:0 6px 18px rgba(0,0,0,0.05)}
.p-img-ph{width:100%;height:160px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:10px;margin-bottom:18px;font-size:40px;flex-shrink:0}
.p-date{font-size:11px;color:var(--accent);margin-bottom:8px;font-weight:600;letter-spacing:0.06em}
.p-title{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.4}

.p-scroll {flex:1;overflow-y:auto;padding-right:6px;margin-bottom:12px;}
.p-text{font-size:14px;color:var(--text);line-height:1.9;word-break:break-all;text-align:justify;}

.p-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:12px;border-top:1px solid var(--border);flex-shrink:0}
.p-tag{font-size:11px;padding:2px 10px;border-radius:20px;background:var(--bg2);color:var(--accent);font-weight:500}
.p-num{position:absolute;bottom:14px;font-size:11px;color:var(--text3);font-family:'Noto Serif SC',serif}
.face-front .p-num {right:28px}
.face-back .p-num {left:28px}

/* 大封面 */
.p-cover-front {background: linear-gradient(135deg,#ff597
