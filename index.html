<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的恋爱日记 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* 甜美恋爱风配色体系 */
  --bg: #fff5f6;          /* 蜜桃粉白底色 */
  --bg2: #ffe3e7;         /* 浅樱花粉（按钮悬停、标签等） */
  --card: #ffffff;        /* 纯白卡片衬底 */
  --border: #ffd0d6;      /* 柔和粉纽边界 */
  --border2: #ffb3be;     /* 深粉边界 */
  --text: #4a3739;        /* 深可可褐（比纯黑更温柔） */
  --text2: #85666a;       /* 玫瑰褐（次要文本） */
  --text3: #bfa1a4;       /* 浅粉褐（提示字） */
  --accent: #ff6b8b;      /* 主色调：心动草莓红 */
  --accent2: #ff94a2;     /* 辅色调：温柔蜜桃粉 */
  --danger: #e04d4d;      /* 警告红 */
  --shadow: 0 4px 16px rgba(255, 107, 139, 0.08);
  --shadow2: 0 8px 32px rgba(255, 107, 139, 0.15);
  --radius: 16px;
  --radius-sm: 10px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* 自定义滚动条 - 让长文本滚动更精致 */
::-webkit-scrollbar {width: 6px; height: 6px;}
::-webkit-scrollbar-track {background: transparent;}
::-webkit-scrollbar-thumb {background: var(--border2); border-radius: 10px;}
::-webkit-scrollbar-thumb:hover {background: var(--accent);}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(255,107,139,0.05)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:24px; filter: drop-shadow(0 2px 4px rgba(255,107,139,0.2))}
.logo-text h1{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;letter-spacing:0.05em;color:var(--accent)}
.logo-text p{font-size:11px;color:var(--text2);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:#5cb85c}.sync-dot.err{background:var(--danger)}.sync-dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;background:var(--card)}
.btn:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent;font-weight:500;box-shadow: 0 2px 6px rgba(255,107,139,0.3)}
.btn-primary:hover{background:#ff4d73;color:#fff}
.btn-book{background:var(--accent2);color:#fff;border-color:transparent;font-weight:500;box-shadow: 0 2px 6px rgba(255,148,162,0.3)}
.btn-book:hover{background:#ff7a8b;color:#fff}

/* TOOLBAR */
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--accent2);pointer-events:none;width:15px;height:15px}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;transition:all 0.15s}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow: 0 0 0 3px rgba(255,107,139,0.1)}
.tags-filter{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-btn{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--bg);color:var(--text2);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans SC',sans-serif}
.tag-btn.active{background:var(--accent);color:#fff;border-color:transparent;box-shadow: 0 2px 6px rgba(255,107,139,0.2)}
.tag-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--bg2)}

/* CONTENT */
.content{padding:24px 28px;max-width:1000px;margin:0 auto}
.empty-state{text-align:center;padding:80px 24px;color:var(--text3)}
.empty-icon{font-size:52px;margin-bottom:16px;animation: heartBeat 2s infinite alternate}
@keyframes heartBeat { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
.empty-state p{font-family:'Noto Serif SC',serif;font-size:16px;margin-bottom:20px;color:var(--text2)}
.no-results{text-align:center;padding:60px 24px;color:var(--text3)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:var(--shadow)}
.card:hover{border-color:var(--accent);box-shadow:var(--shadow2);transform:translateY(-4px)}
.card-img{width:100%;height:180px;object-fit:cover;display:block}
.card-img-ph{width:100%;height:180px;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--accent2);font-size:36px}
.card-body{padding:14px 16px 6px}
.card-date{font-size:11px;color:var(--accent2);margin-bottom:6px;font-weight:500}
.card-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
/* 列表页卡片高度限制，长文本在这里截断，翻书页展开 */
.card-text{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:56px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;padding:8px 16px 0}
.card-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--accent);border:1px solid transparent}
.card-footer{display:flex;justify-content:flex-end;gap:4px;padding:8px 12px 12px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:6px 8px;border-radius:8px;display:inline-flex;align-items:center;transition:all 0.15s;font-size:14px}
.icon-btn:hover{color:var(--accent);background:var(--bg2)}
.icon-btn.danger:hover{color:var(--danger);background:#ffebeb}
mark.hl{background:rgba(255,107,139,0.2);border-radius:2px;color:inherit;font-weight:500}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(74,55,57,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal-header{padding:18px 20px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-header h2{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--accent)}
.modal-body{padding:18px 20px 20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600;letter-spacing:0.04em}
.field input,.field textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;font-size:13px;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;resize:vertical;transition:all 0.15s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow: 0 0 0 3px rgba(255,107,139,0.1)}
.field textarea{min-height:120px;line-height:1.7}
.upload-area{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:26px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;background:var(--bg)}
.upload-area:hover{border-color:var(--accent);background:var(--bg2)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-area p{font-size:12px;color:var(--text2)}
.preview-wrap{position:relative;margin-bottom:12px}
.preview-img{width:100%;max-height:190px;object-fit:contain;border-radius:var(--radius-sm);display:block;background:var(--bg)}
.remove-img{position:absolute;top:6px;right:6px;background:rgba(255,107,139,0.8);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition: background 0.15s;}
.remove-img:hover{background:var(--danger)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);margin-top:16px;padding-top:14px}
.compress-hint{font-size:11px;color:var(--accent);margin-top:4px;display:none}

/* 口令弹窗 */
.passphrase-modal{max-width:400px}
.passphrase-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.passphrase-hint{font-size:11px;color:var(--text3);margin-top:8px}

/* ===== 翻书阅读模式 ===== */
.book-overlay{position:fixed;inset:0;background:rgba(42,30,32,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px)}
.book-header{position:absolute;top:0;left:0;right:0;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;color:rgba(255,255,255,0.85)}
.book-header-title{font-family:'Noto Serif SC',serif;font-size:16px;color:#fff;font-weight:600}
.book-close{background:none;border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:13px;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s}
.book-close:hover{background:var(--accent);border-color:transparent;color:#fff}
.book-counter{font-size:13px;color:rgba(255,255,255,0.6)}

/* 书本容器 */
.book-scene{perspective:2000px;width:min(720px,92vw);height:min(520px,80vh)}
.book{width:100%;height:100%;position:relative;transform-style:preserve-3d}

/* 单页 */
.book-spread{position:absolute;inset:0;display:flex;border-radius:12px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,0.4)}

/* 左页与右页 */
.page-left{flex:1;background:#fffcfc;border-right:1px solid #ffdcd0;position:relative;overflow:hidden;display:flex;flex-direction:column}
.page-right{flex:1;background:#ffffff;position:relative;overflow:hidden;display:flex;flex-direction:column}
.book-spine{position:absolute;left:50%;top:0;bottom:0;width:8px;transform:translateX(-50%);background:linear-gradient(to right,#ffebed,#fffbfb,#ffebed);z-index:2;box-shadow:0 0 10px rgba(255,107,139,0.15)}

/* 页面内容与长文本滚动能力增加 */
.page-content{flex:1;padding:32px 28px;overflow:hidden;display:flex;flex-direction:column;position:relative}
.page-img{width:100%;height:180px;object-fit:cover;border-radius:8px;margin-bottom:14px;flex-shrink:0;box-shadow: 0 2px 8px rgba(0,0,0,0.05)}
.page-img-ph{width:100%;height:140px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px;margin-bottom:14px;font-size:40px;flex-shrink:0}
.page-date{font-size:11px;color:var(--accent);margin-bottom:6px;letter-spacing:0.05em;font-weight:600}
.page-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--text);margin-
