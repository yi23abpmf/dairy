<script>
const SUPABASE_URL='https://ypjyuuoddukuwcquqgny.supabase.co';
const SUPABASE_KEY='sb_publishable_hRBNbp6yg2IDOcnDXh9tdw_foNAi3gZ';
const TABLE='diary_entries';

let entries=[],passphrase='',editId=null,viewId=null,imgData=null,activeTag=null;
let bookPage=0,bookEntries=[],isTurning=false;

// ===== SUPABASE =====
async function sbFetch(path,options={}){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    ...options,
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(options.headers||{})}
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):[];
}
async function loadFromCloud(){
  setSyncStatus('loading','拉取记忆中…');
  try{
    const data=await sbFetch(TABLE+'?passphrase=eq.'+encodeURIComponent(passphrase)+'&order=date.desc');
    entries=data.map(r=>({id:r.id,title:r.title||'',date:r.date||'',text:r.content||'',tags:r.tags||[],img:r.img||null}));
    setSyncStatus('ok','已甜美同步');render();
  }catch(e){setSyncStatus('err','同步失败');console.error(e);}
}
async function upsertEntry(entry){
  setSyncStatus('loading','保存记忆中…');
  try{
    await sbFetch(TABLE,{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify({id:entry.id,passphrase,title:entry.title,date:entry.date,content:entry.text,tags:entry.tags,img:entry.img,updated_at:new Date().toISOString()})});
    setSyncStatus('ok','已安全同步');
  }catch(e){setSyncStatus('err','保存失败');console.error(e);}
}
async function deleteFromCloud(id){
  try{await sbFetch(TABLE+'?id=eq.'+id+'&passphrase=eq.'+encodeURIComponent(passphrase),{method:'DELETE'});setSyncStatus('ok','已同步');}
  catch(e){setSyncStatus('err','删除失败');}
}

// ===== UI =====
function setSyncStatus(s,t){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncText').textContent=t;}
function today(){return new Date().toISOString().split('T')[0];}
function fmt(d){if(!d)return'';const p=d.split('-');return p[0]+'年'+p[1]+'月'+p[2]+'日';}
function allTags(){const s=new Set();entries.forEach(e=>(e.tags||[]).forEach(t=>t&&s.add(t)));return[...s];}
function hl(t,q){if(!q||!t)return t||'';const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return t.replace(new RegExp('('+e+')','gi'),'<mark class="hl">$1</mark>');}

// 【修复：重构标签动态渲染逻辑，彻底避开拼接引号引发的语法中断】
function renderTagsFilter(){
  const tags=allTags(),w=document.getElementById('tagsFilter');
  if(!tags.length){w.innerHTML='';return;}
  
  w.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className=`tag-btn ${!activeTag?'active':''}`;
  allBtn.textContent='全部时光';
  allBtn.onclick=()=>setTag(null);
  w.appendChild(allBtn);

  tags.forEach(t=>{
    const btn=document.createElement('button');
    btn.className=`tag-btn ${activeTag===t?'active':''}`;
    btn.textContent=t;
    btn.onclick=()=>setTag(t);
    w.appendChild(btn);
  });
}
function setTag(t){activeTag=t;renderTagsFilter();filterRender();}

function filterRender(){
  const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=sorted.filter(e=>{
    if(activeTag&&!(e.tags||[]).includes(activeTag))return false;
    if(!q)return true;
    return(e.title||'').toLowerCase().includes(q)||(e.text||'').toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q));
  });
  const grid=document.getElementById('grid'),emp=document.getElementById('emptyState'),nor=document.getElementById('noResults'),sub=document.getElementById('subtitle');
  sub.textContent='共珍藏了 '+entries.length+' 个美好瞬间';
  document.getElementById('readBtn').style.display=entries.length>0?'inline-flex':'none';
  if(entries.length===0){emp.style.display='block';nor.style.display='none';grid.innerHTML='';sub.textContent='暂无记录';return;}
  emp.style.display='none';
  if(filtered.length===0){nor.style.display='block';grid.innerHTML='';return;}
  nor.style.display='none';
  grid.innerHTML=filtered.map(e=>`
    <div class="card" onclick="openBook(${entries.indexOf(e)})">
      ${e.img?`<img class="card-img" src="${e.img}" alt="">`:
      `<div class="card-img-ph">💝</div>`}
      <div class="card-body">
        <div class="card-date">${fmt(e.date)}</div>
        <div class="card-title">${q?hl(e.title||'未命名瞬间',q):e.title||'未命名瞬间'}</div>
        <div class="card-text">${q?hl(e.text||'',q):(e.text||'')}</div>
      </div>
      ${(e.tags||[]).length?`<div class="card-tags">${(e.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>`:''}
      <div class="card-footer">
        <button class="icon-btn" onclick="event.stopPropagation();editEntry('${e.id}')" title="重写这段记忆">✏️</button>
        <button class="icon-btn danger" onclick="event.stopPropagation();deleteEntry('${e.id}')" title="抹去这段记忆">🗑️</button>
      </div>
    </div>`).join('');
}
function render(){renderTagsFilter();filterRender();}

// ===== 翻书模式 =====
function openBook(startIdx){
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  bookEntries=sorted;
  bookPage=Math.max(0,Math.min(startIdx,bookEntries.length-1));
  document.getElementById('bookOverlay').style.display='flex';
  document.body.style.overflow='hidden';
  renderBook();
}
function closeBook(){
  document.getElementById('bookOverlay').style.display='none';
  document.body.style.overflow='';
}

function renderBook(){
  const total=bookEntries.length;
  if(total===0) return;
  const e=bookEntries[bookPage];

  const left=document.getElementById('pageLeft');
  const right=document.getElementById('pageRight');

  if(bookPage===0){
    left.innerHTML=`<div class="page-cover">
      <div class="cover-icon">💖</div>
      <h2>我们的恋爱日记</h2>
      <p>共珍藏了 ${total} 篇回忆</p>
    </div>`;
  } else {
    left.innerHTML=buildPageHTML(bookEntries[bookPage-1],bookPage);
  }

  right.innerHTML=buildPageHTML(e,bookPage+1);

  const bindZoom = (el) => {
    el.querySelectorAll('.page-img').forEach(img=>{
      img.style.cursor='zoom-in';
      img.onclick=()=>{
        const z=document.getElementById('imgZoom');
        document.getElementById('imgZoomSrc').src=img.src;
        z.style.display='flex';
      };
    });
  };
  bindZoom(left);
  bindZoom(right);

  document.getElementById('bookCounter').textContent=`${bookPage+1} / ${total}`;
  document.getElementById('btnPrev').disabled=bookPage===0;
  document.getElementById('btnNext').disabled=bookPage===total-1;

  const dots=document.getElementById('bookDots');
  const maxDots=Math.min(total,9);
  let start=Math.max(0,bookPage-Math.floor(maxDots/2));
  start=Math.min(start,total-maxDots);
  dots.innerHTML=Array.from({length:Math.min(total,maxDots)},(_,i)=>{
    const idx=start+i;
    return`<div class="book-dot ${idx===bookPage?'active':''}" onclick="jumpToPage(${idx})"></div>`;
  }).join('');
}

function buildPageHTML(e,pageNum){
  if(!e) return '';
  return`<div class="page-content">
    ${e.img?`<img class="page-img" src="${e.img}" alt="${(e.title||'').replace(/"/g,'&quot;')}">`:
    `<div class="page-img-ph">💝</div>`}
    <div class="page-date">${fmt(e.date)}</div>
    <div class="page-title">${e.title||'未命名瞬间'}</div>
    <div class="page-body-scroll">
      <div class="page-text">${(e.text||'').replace(/\n/g,'<br>')}</div>
    </div>
    ${(e.tags||[]).length?`<div class="page-tags">${(e.tags||[]).map(t=>`<span class="page-tag">${t}</span>`).join('')}</div>`:''}
    <div class="page-num">${pageNum}</div>
  </div>`;
}

function turnPage(dir){
  if(isTurning)return;
  const newPage=bookPage+dir;
  if(newPage<0||newPage>=bookEntries.length)return;
  isTurning=true;

  const spread=document.getElementById('bookSpread');
  spread.style.transition='transform 0.1s';

  const animOut=dir>0?'translateX(-3%) rotateY(-8deg)':'translateX(3%) rotateY(8deg)';
  spread.style.transform=animOut;
  spread.style.opacity='0.7';

  setTimeout(()=>{
    bookPage=newPage;
    renderBook();
    spread.style.transition='none';
    const animIn=dir>0?'translateX(3%) rotateY(8deg)':'translateX(-3%) rotateY(-8deg)';
    spread.style.transform=animIn;
    spread.style.opacity='0.7';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        spread.style.transition='transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.35s';
        spread.style.transform='translateX(0) rotateY(0)';
        spread.style.opacity='1';
        setTimeout(()=>{isTurning=false;},350);
      });
    });
  },180);
}

function jumpToPage(idx){
  if(idx===bookPage||isTurning)return;
  bookPage=idx;
  isTurning=true;
  const spread=document.getElementById('bookSpread');
  spread.style.transition='opacity 0.2s';
  spread.style.opacity='0';
  setTimeout(()=>{
    renderBook();
    spread.style.opacity='1';
    setTimeout(()=>{isTurning=false;},200);
  },200);
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('bookOverlay').style.display==='none')return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')turnPage(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')turnPage(-1);
  if(e.key==='Escape')closeBook();
});

// ===== 口令 =====
function openPassphrase(){
  document.getElementById('passphraseInput').value=passphrase||'';
  document.getElementById('passphraseModal').style.display='flex';
}
function confirmPassphrase(){
  const val=document.getElementById('passphraseInput').value.trim();
  if(!val){alert('请输入恋爱暗号哦');return;}
  passphrase=val;localStorage.setItem('diary_passphrase',passphrase);
  closeModal('passphraseModal');loadFromCloud();
}

// ===== 编辑 =====
function openNew(){
  editId=null;imgData=null;
  document.getElementById('titleInput').value='';
  document.getElementById('dateInput').value=today();
  document.getElementById('textInput').value='';
  document.getElementById('tagsInput').value='';
  document.getElementById('imgPreview').src='';
  document.getElementById('previewWrap').style.display='none';
  document.getElementById('uploadArea').style.display='block';
  document.getElementById('imgInput').value='';
  document.getElementById('compressHint').style.display='none';
  document.getElementById('modalTitle').textContent='记录新的甜蜜瞬间';
  document.getElementById('editModal').style.display='flex';
}
function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editId=id;imgData=e.img||null;
  document.getElementById('titleInput').value=e.title||'';
  document.getElementById('dateInput').value=e.date||today();
  document.getElementById('textInput').value=e.text||'';
  document.getElementById('tagsInput').value=(e.tags||[]).join(', ');
  document.getElementById('imgInput').value='';
  document.getElementById('compressHint').style.display='none';
  if(e.img){document.getElementById('imgPreview').src=e.img;document.getElementById('previewWrap').style.display='block';document.getElementById('uploadArea').style.display='none';}
  else{document.getElementById('previewWrap').style.display='none';document.getElementById('uploadArea').style.display='block';}
  document.getElementById('modalTitle').textContent='修改这段记忆';
  document.getElementById('editModal').style.display='flex';
}
function removeImg(){imgData=null;document.getElementById('imgPreview').src='';document.getElementById('previewWrap').style.display='none';document.getElementById('uploadArea').style.display='block';document.getElementById('imgInput').value='';document.getElementById('compressHint').style.display='none';}

async function deleteEntry(id){
  if(!confirm('确定要悄悄抹去这段回忆吗？'))return;
  entries=entries.filter(x=>x.id!==id);render();
  await deleteFromCloud(id);
}

function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.src=ev.target.result;
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let width=img.width;
      let height=img.height;
      const MAX_WIDTH=1024;
      if(width>MAX_WIDTH){
        height=Math.round((height*MAX_WIDTH)/width);
        width=MAX_WIDTH;
      }
      canvas.width=width;
      canvas.height=height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,width,height);
      imgData=canvas.toDataURL('image/jpeg',0.8);
      document.getElementById('imgPreview').src=imgData;
      document.getElementById('previewWrap').style.display='block';
      document.getElementById('uploadArea').style.display='none';
      document.getElementById('compressHint').style.display='block';
    };
  };
  reader.readAsDataURL(file);
}

async function saveEntry(){
  const title=document.getElementById('titleInput').value.trim();
  const date=document.getElementById('dateInput').value||today();
  const text=document.getElementById('textInput').value.trim();
  const tagsRaw=document.getElementById('tagsInput').value.trim();
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
  if(!title&&!imgData&&!text){alert('写点字、传张照片或者起个标题再保存哦~');return;}
  const entry={id:editId||Date.now().toString(),title,date,text,tags,img:imgData};
  if(editId){const i=entries.findIndex(x=>x.id===editId);if(i>=0)entries[i]=entry;}
  else entries.unshift(entry);
  closeModal('editModal');render();
  await upsertEntry(entry);
}
function closeModal(id){document.getElementById(id).style.display='none';}
function overlayClose(e,id){if(e.target===document.getElementById(id))closeModal(id);}

// ===== 启动 =====
(async function init(){
  const saved=localStorage.getItem('diary_passphrase');
  document.getElementById('loadingOverlay').style.display='none';
  if(saved){passphrase=saved;await loadFromCloud();}
  else openPassphrase();
})();
</script>
