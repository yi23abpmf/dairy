<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的恋爱时光书架 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="https://fav.farm/💖">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #fff2f4;          
  --bg2: #ffe1e6;         
  --card: #ffffff;        
  --border: #ffd0d6;      
  --border2: #ffb3be;     
  --text: #4a3739;        
  --text2: #85666a;       
  --text3: #bfa1a4;       
  --accent: #ff6b8b;      
  --accent2: #ff94a2;     
  --danger: #e04d4d;      
  --shadow: 0 6px 16px rgba(255, 107, 139, 0.08);
  --shadow2: 0 12px 28px rgba(255, 107, 139, 0.18);
  --radius: 14px;
  --radius-sm: 8px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Custom Scrollbar */
::-webkit-scrollbar {width: 6px; height: 6px;}
::-webkit-scrollbar-track {background: transparent;}
::-webkit-scrollbar-thumb {background: var(--border2); border-radius: 10px;}
::-webkit-scrollbar-thumb:hover {background: var(--accent);}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(255,107,139,0.05)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:24px; filter: drop-shadow(0 2px 4px rgba(255,107,139,0.2))}
.logo-text h1{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;letter-spacing:0.05em;color:var(--accent)}
.logo-text p{font-size:11px;color:var(--text2);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.sync-status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:#5cb85c}.sync-dot.err{background:var(--danger)}.sync-dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.btn{border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;background:var(--card)}
.btn:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent;font-weight:500;box-shadow: 0 2px 6px rgba(255,107,139,0.3)}
.btn-primary:hover{background:#ff4d73;color:#fff}

/* TOOLBAR */
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:10px;align-items:center;justify-content:space-between}
.search-wrap{position:relative;width:300px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--accent2);pointer-events:none;width:15px;height:15px}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);transition:all 0.15s}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:var(--card)}

/* ===== 3D 书架主大厅 ===== */
.content{padding:30px 28px;max-width:1200px;margin:0 auto}
.shelf-section{margin-bottom:40px}
.shelf-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:24px;display:flex;align-items:center;gap:8px}
.shelf-title span{font-size:12px;font-weight:400;color:var(--text2);background:var(--bg2);padding:2px 8px;border-radius:12px}

/* 书架网格 */
.grid-books{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:25px 24px;padding-bottom:16px;border-bottom: 6px solid #f9d2d7;box-shadow: 0 10px 10px -8px rgba(255,107,139,0.12);border-radius: 4px;}

/* 【核心保障】主页小书本卡片维持紧凑精悍的 245px 高度，不留白 */
.book-container {perspective: 1000px;width: 140px;height: 245px;margin: 0 auto;cursor: pointer;position: relative;}
.book-3d {
  width: 100%;height: 100%;position: relative;transform-style: preserve-3d;
  transform: rotateY(-12deg) translateZ(0);transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .book-3d {
  transform: rotateY(-24deg) rotateX(4deg) translateZ(10px);
}

.b-face {position: absolute;border-radius: 4px 8px 8px 4px;}

/* 上半部分照片 */
.b-cover-top {
  position: absolute;top: 0;left: 0;width: 100%;height: 165px;
  z-index: 5;overflow: hidden;border-radius: 4px 8px 0 0;
  box-shadow: 4px 2px 10px rgba(44,36,37,0.1);
  transform: translateZ(2px);
}
.b-cover-img-bg {
  width: 100%;height: 100%;object-fit: cover;
  filter: brightness(0.85) contrast(0.98);transition: transform 0.4s;
}
.book-container:hover .b-cover-img-bg { transform: scale(1.06); }
.b-cover-top.no-photo-bg { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

.b-cover-tag-badge {
  position: absolute; top: 10px; left: 10px; z-index: 6;
  font-size: 10px; font-weight: 500; color: #fff;
  background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); 
  padding: 2px 6px; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.15);
  max-width: 85%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* 下半部分白底标题说明页 */
.b-cover-bottom {
  position: absolute;top: 165px;left: 0;width: 100%;height: 80px;
  background: #fffdf9;z-index: 5;padding: 8px 10px;
  border: 1px solid var(--border);border-top: none;
  border-radius: 0 0 8px 4px;
  box-shadow: 4px 4px 10px rgba(44,36,37,0.12);
  display: flex;flex-direction: column;justify-content: space-between;
  transform: translateZ(2px);
}
.b-cover-title {
  font-family:'Noto Serif SC',serif;font-size:12.5px;font-weight:700;color:var(--text);
  line-height: 1.4;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.b-cover-footer {
  font-size:10px;color:var(--text2);opacity:0.8;
  display:flex;justify-content:space-between;align-items:center;
  border-top:1.5px dashed var(--bg2);padding-top:4px;margin-top:2px;
}

.b-spine { position: absolute; top: 0; bottom: 0; width: 8px; left: -4px; transform: rotateY(-90deg) translateZ(0); background: #e05372; z-index: 4; border-radius: 4px 0 0 4px; }
.b-page-stack { position: absolute; inset: 0; background: #fffcf5; transform: translateZ(-2px); z-index: 3; border-radius: 4px 8px 8px 4px; }

/* 悬浮小按钮气泡 */
.book-actions {
  position: absolute; top: 130px; right: 8px; z-index: 15;
  display: flex; gap: 4px; opacity: 0; transform: translateY(4px);
  transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .book-actions { opacity: 1; transform: translateY(0); }

.action-btn-sm {
  background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px);
  border: 1px solid rgba(255,107,139,0.2); cursor: pointer; font-size: 11px;
  padding: 3px 7px; border-radius: 6px; color: var(--text); font-weight: 500;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08); transition: all 0.15s;
}
.action-btn-sm:hover { background: var(--accent); color: #fff; border-color: transparent; }
.action-btn-sm.btn-del:hover { background: var(--danger); color: #fff; }

/* 空状态 */
.empty-state{text-align:center;padding:100px 24px;color:var(--text3);max-width:600px;margin:0 auto;}
.empty-icon{font-size:60px;margin-bottom:16px;animation: heartBeat 2s infinite alternate}
@keyframes heartBeat { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
.empty-state p{font-size:15px;color:var(--text2);margin-bottom:24px;}

/* ===== 【核心更新】沉浸式 3D 物理大书页面组件，高度恢复优雅高挑比例 ===== */
.book-overlay{position:fixed;inset:0;background:rgba(42,30,32,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px)}
.book-header{position:absolute;top:0;left:0;right:0;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;color:#fff}
.book-header-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600}
.book-close{background:none;border:1px solid rgba(255,25
