<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>我们的恋爱时光书架 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="https://fav.farm/💖">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #fff4f6;          
  --bg2: #ffe5e9;         
  --card: #ffffff;        
  --border: rgba(255, 182, 193, 0.4);      
  --border2: #ffb3be;     
  --text: #3c2f31;        
  --text2: #755e61;       
  --text3: #c2b0b2;       
  --accent: #ff597b;      
  --accent2: #ff8e9e;     
  --danger: #eb4d4d;      
  --shadow: 0 6px 16px rgba(255, 89, 123, 0.04), 0 12px 24px rgba(255, 89, 123, 0.06);
  --shadow2: 0 16px 32px rgba(255, 89, 123, 0.12), 0 24px 48px rgba(255, 89, 123, 0.16);
  --radius: 16px;
  --radius-sm: 10px;
}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* 微流控隐藏式滚动条 */
::-webkit-scrollbar {width: 5px; height: 5px;}
::-webkit-scrollbar-track {background: transparent;}
::-webkit-scrollbar-thumb {background: rgba(255, 89, 123, 0.25); border-radius: 10px;}
::-webkit-scrollbar-thumb:hover {background: var(--accent);}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:0 4px 20px rgba(255,89,123,0.02)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{font-size:24px; filter: drop-shadow(0 4px 6px rgba(255,89,123,0.25))}
.logo-text h1{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;letter-spacing:0.08em;color:var(--accent)}
.logo-text p{font-size:11px;color:var(--text2);margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.sync-status{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.sync-dot.ok{background:#5cb85c;box-shadow:0 0 8px #5cb85c}.sync-dot.err{background:var(--danger);box-shadow:0 0 8px var(--danger)}.sync-dot.loading{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.btn{border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);font-family:'Noto Sans SC',sans-serif;background:var(--card);font-weight:500;}
.btn:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent;font-weight:500;box-shadow: 0 4px 12px rgba(255,89,123,0.35)}
.btn-primary:hover{background:#ff3d63;color:#fff;}

/* TOOLBAR */
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;gap:10px;align-items:center;justify-content:space-between}
.search-wrap{position:relative;width:280px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--accent2);pointer-events:none;width:14px;height:14px}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px;background:var(--bg);color:var(--text);transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);}
.search-wrap input:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow: 0 0 0 3px rgba(255,89,123,0.08)}

/* ===== 3D 书架主大厅 ===== */
.content{padding:30px 28px;max-width:1240px;margin:0 auto}
.shelf-section{margin-bottom:45px}
.shelf-title{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:24px;display:flex;align-items:center;gap:10px;letter-spacing:0.04em}
.shelf-title span{font-size:11px;font-weight:500;color:var(--accent);background:var(--bg2);padding:3px 10px;border-radius:20px;}

.grid-books{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:25px 24px;padding-bottom:20px;border-bottom: 4px solid #f7c3cb;box-shadow: 0 12px 16px -12px rgba(255,89,123,0.15);border-radius: 2px;}

/* 小立体书 */
.book-container {perspective: 1000px;width: 135px;height: 245px;margin: 0 auto;cursor: pointer;position: relative;}
.book-3d {
  width: 100%;height: 100%;position: relative;transform-style: preserve-3d;
  transform: rotateY(-10deg) translateZ(0);transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .book-3d {
  transform: rotateY(-22deg) rotateX(4deg) translateZ(12px);
}

.b-face {position: absolute;border-radius: 4px 8px 8px 4px;}

.b-cover-top {
  position: absolute;top: 0;left: 0;width: 100%;height: 165px;
  z-index: 5;overflow: hidden;border-radius: 5px 8px 0 0;
  box-shadow: var(--shadow);border: 1px solid rgba(255,255,255,0.4);
  border-bottom: none;transform: translateZ(2px);
}
.b-cover-img-bg {
  width: 100%;height: 100%;object-fit: cover;
  filter: brightness(0.9) contrast(1.02);transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .b-cover-img-bg { transform: scale(1.08); }
.b-cover-top.no-photo-bg { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

.b-cover-tag-badge {
  position: absolute; top: 10px; left: 10px; z-index: 6;
  font-size: 9.5px; font-weight: 500; color: #fff;
  background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(6px); 
  padding: 2px 7px; border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.2);
  max-width: 85%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.b-cover-bottom {
  position: absolute;top: 165px;left: 0;width: 100%;height: 80px;
  background: #ffffff;z-index: 5;padding: 10px 10px 8px;
  border: 1px solid var(--border);border-top: none;
  border-radius: 0 0 8px 4px;
  box-shadow: 0 8px 20px rgba(44,36,37,0.05);
  display: flex;flex-direction: column;justify-content: space-between;
  transform: translateZ(2px);
}
.b-cover-title {
  font-family:'Noto Serif SC',serif;font-size:12.5px;font-weight:700;color:var(--text);
  line-height: 1.4;word-break:break-all;
}
.b-cover-footer {
  font-size: 9.5px;color:var(--text2);opacity:0.75;
  display:flex;justify-content:space-between;align-items:center;
  border-top: 1px dashed rgba(255, 182, 193, 0.5);padding-top:5px;margin-top:2px;
}

.b-spine { position: absolute; top: 0; bottom: 0; width: 6px; left: -3px; transform: rotateY(-90deg) translateZ(0); background: #e04b6b; z-index: 4; border-radius: 3px 0 0 3px; }
.b-page-stack { position: absolute; inset: 0; background: #fffdfa; transform: translateZ(-2px); z-index: 3; border-radius: 4px 8px 8px 4px; }

.book-actions {
  position: absolute; top: 130px; right: 8px; z-index: 15;
  display: flex; gap: 4px; opacity: 0; transform: translateY(6px);
  transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.book-container:hover .book-actions { opacity: 1; transform: translateY(0); }

.action-btn-sm {
  background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,107,139,0.15); cursor: pointer; font-size: 11px;
  padding: 4px 8px; border-radius: 6px; color: var(--text); font-weight: 500;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.2s;
}
.action-btn-sm:hover { background: var(--accent); color: #fff; border-color: transparent; transform: scale(1.05); }
.action-btn-sm.btn-del:hover { background: var(--danger); }

/* 空提示 */
.empty-state{text-align:center;padding:120px 24px;color:var(--text3);max-width:600px;margin:0 auto;}
.empty-icon{font-size:64px;margin-bottom:20px;animation: heartBeat 2s infinite alternate}
@keyframes heartBeat { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
.empty-state p{font-size:15px;color:var(--text2);margin-bottom:24px;font-family:'Noto Serif SC',serif;}

/* ===== 3D 相册大窗 ===== */
.book-overlay{position:fixed;inset:0;background:rgba(34,25,26,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(10px)}
.book-header{position:absolute;top:0;left:0;right:0;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;color:#fff}
.book-header-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:600;letter-spacing:0.04em}
.book-close{background:none;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.8);border-radius:var(--radius-sm);padding:6px 16px;cursor:pointer;font-size:13px;transition:all 0.25s}
.book-close:hover{background:var(--accent);border-color:transparent;color:#fff}

.book-scene3d { perspective: 2200px; width: min(860px, 95vw); height: 530px; display: flex; align-items: center; justify-content: center; }
.real-book { width: 50%; height: 100%; position: relative; transform-style: preserve-3d; transform: translateX(50%); transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
.real-book.is-opened { transform: translateX(0); }

.paper-page { position: absolute; inset: 0; transform-origin: left center; transform-style: preserve-3d; transition: transform 0.85s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10; pointer-events: none; }
.paper-page.active-flip { pointer-events: auto; }

.page-face { position: absolute; inset: 0; backface-visibility: hidden; background: #ffffff; box-shadow: inset 4px 0 30px rgba(0,0,0,0.03); display: flex; flex-direction: column; overflow: hidden; }
.page-face.face-back { transform: rotateY(180deg); background: #fffefe; box-shadow: inset -4px 0 30px rgba(0,0,0,0.03); border-right: 1px solid #ffdcd0; }
.paper-page.flipped { transform: rotateY(-180deg); }

/* 书内页 */
.p-inner {flex:1;padding:36px 32px;display:flex;flex-direction:column;position:relative;height:100%}
.p-img{width:100%;height:240px;object-fit:cover;border-radius:10px;margin-bottom:18px;flex-shrink:0;box-shadow:0 6px 18px rgba(0,0,0,0.05)}
.p-img-ph{width:100%;height:160px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:10px;margin-bottom:18px;font-size:40px;flex-shrink:0}
.p-date{font-size:11px;color:var(--accent);margin-bottom:8px;font-weight:600;letter-spacing:0.06em}
.p-title{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.4}

.p-scroll {flex:1;overflow-y:auto;padding-right:6px;margin-bottom:12px;}
.p-text{font-size:14px;color:var(--text);line-height:1.9;word-break:break-all;text-align:justify;}

.p-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:12px;border-top:1px solid var(--border);flex-shrink:0}
.p-tag{font-size:11px;padding:2px 10px;border-radius:20px;background:var(--bg2);color:var(--accent);font-weight:500}
.p-num{position:absolute;bottom:14px;font-size:11px;color:var(--text3);font-family:'Noto Serif SC',serif}
.face-front .p-num {right:24px}
.face-back .p-num {left:24px}

/* 大相册封面 */
.p-cover-front {background: linear-gradient(135deg,#ff597b,#ff8e9e);color:#fff;align-items:center;justify-content:center;text-align:center;gap:16px;box-shadow: inset 5px 0 15px rgba(0,0,0,0.12);position: relative;}
.p-cover-front-content { position: relative; z-index: 2; }
.p-cover-front h2{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:700;letter-spacing:0.08em;text-shadow:0 3px 8px rgba(0,0,0,0.12)}
.p-cover-front p{font-size:12.5px;opacity:0.95;background:rgba(255,255,255,0.22);backdrop-filter: blur(66px);padding:4px 14px;border-radius:20px;margin-top:10px;display:inline-block;border:0.5px solid rgba(255,255,255,0.15);}
.p-cover-front .c-icon {font-size:56px;animation: heartBeat 1.5s infinite alternate; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1))}

.book-nav{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:20px 40px;z-index:210}
.book-nav-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:50%;width:46px;height:46px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.3s;backdrop-filter:blur(4px)}
.book-nav-btn:hover:not(:disabled){background:var(--accent);border-color:transparent;transform:scale(1.08)}
.book-nav-btn:disabled{opacity:0.15;cursor:not-allowed}

/* MODAL CONTAINER */
.overlay{position:fixed;inset:0;background:rgba(44,33,35,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(5px)}
.modal{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal-header{padding:18px 20px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.modal-header h2{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--accent)}
.modal-body{padding:18px 20px 20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600}
.field input,.field textarea{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);resize:vertical;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:var(--card);box-shadow:0 0 0 3px rgba(255,89,123,0.08)}
.field textarea{min-height:120px;line-height:1.75}
.upload-area{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:24px;text-align:center;cursor:pointer;position:relative;background:var(--bg)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:26px;margin-bottom:6px}
.preview-wrap{position:relative;margin-bottom:12px}
.preview-img{width:100%;max-height:180px;object-fit:contain;border-radius:var(--radius-sm);display:block;background:var(--bg)}
.remove-img{position:absolute;top:6px;right:6px;background:rgba(255,89,123,0.85);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);margin-top:16px;padding-top:14px}
.compress-hint{font-size:11px;color:var(--accent);margin-top:4px;display:none}

/* 初始转圈层 */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--text2);font-weight:500;">正在铺开我们的时光书架…</div>
</div>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📚</div>
    <div class="logo-text">
      <h1>我们的恋爱时光书架</h1>
      <p id="subtitle">正在清点珍藏…</p>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">未连接</span>
    </div>
    <button class="btn" onclick="openPassphrase()">🔑 恋爱暗号</button>
    <button class="btn btn-primary" onclick="openNew()">＋ 记一笔瞬间</button>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="搜索甜蜜瞬间…" oninput="renderShelf()">
  </div>
  <div style="font-size:11.5px;color:var(--text2);font-weight:500;">✨ 提示：点击书架上的小书，即可沉浸式左右物理翻阅</div>
</div>

<div class="content" id="shelfMainArea">
  <div id="shelfShelves"></div>
  
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-icon">💝</div>
    <p>时光书架上还空空的，快来记录属于你们的第一个瞬间吧~</p>
    <button class="btn btn-primary" onclick="openNew()">开始记录第一笔</button>
  </div>
</div>

<div id="passphraseModal" class="overlay" style="display:none">
  <div class="modal passphrase-modal">
    <div class="modal-header"><h2>🔑 输入专属恋爱暗号</h2></div>
    <div class="modal-body">
      <p class="passphrase-desc">输入两个人的秘密口令（例如 love2026），就能跨设备同步你们的所有专属手帐了。</p>
      <div class="field">
        <label>专属暗号</label>
        <input type="text" id="passphraseInput" placeholder="请输入约定的恋爱暗号" autocomplete="off">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="confirmPassphrase()">开启恋爱手帐</button>
      </div>
    </div>
  </div>
</div>

<div id="editModal" class="overlay" style="display:none" onclick="overlayClose(event,'editModal')">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">记录新的心动</h2>
      <button class="icon-btn" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>照片记忆</label>
        <div id="previewWrap" class="preview-wrap" style="display:none">
          <img id="imgPreview" class="preview-img" alt="">
          <button class="remove-img" onclick="removeImg()">✕</button>
        </div>
        <div id="uploadArea" class="upload-area">
          <input type="file" accept="image/*" onchange="handleImg(event)" id="imgInput">
          <div class="upload-icon">📸</div>
          <p>点击或拖入照片</p>
        </div>
        <div id="compressHint" class="compress-hint">⚡ 图片已自动无损压缩，极速同步</div>
      </div>
      <div class="field"><label>瞬间标题</label><input type="text" id="titleInput" placeholder="起个甜甜的名字…"></div>
      <div class="field"><label>纪念日期</label><input type="date" id="dateInput"></div>
      <div class="field"><label>点滴记录（支持长篇大论）</label><textarea id="textInput" placeholder="写下你们今天的心情、故事与承诺…"></textarea></div>
      <div class="field"><label>标签 / 归属合集（用英文或中文逗号隔开）</label><input type="text" id="tagsInput" placeholder="例如：纪念日, 第一次约会, 美食"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('editModal')">取消</button>
        <button class="btn btn-primary" onclick="saveEntry()">锁进时光云端</button>
      </div>
    </div>
  </div>
</div>

<div id="bookOverlay" class="book-overlay" style="display:none">
  <div class="book-header">
    <div class="book-header-title" id="bookActiveShelfTitle">🌸 某某合集</div>
    <div style="display:flex;align-items:center;gap:20px">
      <button class="book-close" onclick="closeBook()">✕ 放回书架</button>
    </div>
  </div>

  <div class="book-scene3d">
    <div class="real-book" id="realBookElement"></div>
  </div>

  <div class="book-nav">
    <button class="book-nav-btn" id="btnPrev3D" onclick="turnPage3D(-1)">‹</button>
    <div style="color:rgba(255,255,255,0.55); font-size:12.5px; font-weight:500;" id="bookPageCounter3D">0 / 0</div>
    <button class="book-nav-btn" id="btnNext3D" onclick="turnPage3D(1)">›</button>
  </div>
</div>

<div id="imgZoom" style="display:none;position:fixed;inset:0;background:rgba(18,12,13,0.96);z-index:400;align-items:center;justify-content:center;cursor:zoom-out" onclick="this.style.display='none'">
  <img id="imgZoomSrc" style="max-width:94vw;max-height:94vh;object-fit:contain;border-radius:10px">
</div>

<script>
const SUPABASE_URL='https://ypjyuuoddukuwcquqgny.supabase.co';
const SUPABASE_KEY='sb_publishable_hRBNbp6yg2IDOcnDXh9tdw_foNAi3gZ';
const TABLE='diary_entries';

let entries=[],passphrase='',editId=null,imgData=null;
let currentBookPagesCount=0, currentFlipIndex=0;

// ===== SUPABASE 极其强悍的防屏蔽动态网络重连流 =====
async function sbFetch(path,options={}){
  // 核心解耦：让每次发出去的网络包都强制带上当前毫秒级时间戳，杜绝国内节点对接口数据的恶意缓存拦截
  const separator = path.includes('?') ? '&' : '?';
  const finalPath = path + separator + 't=' + Date.now();
  
  // 增加网络重连容错（重复3次），防止云端域名突发性抖动
  let lastError;
  for(let i=0; i<3; i++){
    try {
      const res = await fetch(SUPABASE_URL+'/rest/v1/'+finalPath,{
        ...options,
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(options.headers||{})}
      });
      if(!res.ok){ const e=await res.text(); throw new Error(e); }
      const t=await res.text(); return t?JSON.parse(t):[];
    } catch(err) {
      lastError = err;
      // 每次重连前温柔等待 300 毫秒，给本地网络恢复的时间
      await new Promise(resolve => setTimeout(resolve, 300));
    }
  }
  throw lastError;
}

function showLoading(msg){
  const el = document.getElementById('loadingOverlay');
  if(el){ el.querySelector('div:last-child').textContent=msg; el.style.display='flex'; }
}
function hideLoading(){
  const el = document.getElementById('loadingOverlay');
  if(el){ el.style.display='none'; }
}

async function loadFromCloud(){
  showLoading('正在整理属于我们的时光画卷…');
  try{
    const data=await sbFetch(TABLE+'?passphrase=eq.'+encodeURIComponent(passphrase)+'&order=date.desc');
    entries=data.map(r=>({id:r.id,title:r.title||'',date:r.date||'',text:r.content||'',tags:r.tags||[],img:r.img||null}));
    setSyncStatus('ok','已甜美同步');
  }catch(e){
    setSyncStatus('err','同步失败（可点击“恋爱暗号”重新确认输入）');
    console.error(e);
  }finally {
    renderShelf();
    hideLoading();
  }
}
async function upsertEntry(entry){
  setSyncStatus('loading','保存记忆中…');
  try{
    await sbFetch(TABLE,{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify({id:entry.id,passphrase,title:entry.title,date:entry.date,content:entry.text,tags:entry.tags,img:entry.img,updated_at:new Date().toISOString()})});
    setSyncStatus('ok','已安全同步');
  }catch(e){setSyncStatus('err','保存失败');}
}
async function deleteFromCloud(id){
  try{await sbFetch(TABLE+'?id=eq.'+id+'&passphrase=eq.'+encodeURIComponent(passphrase),{method:'DELETE'});setSyncStatus('ok','已同步');}
  catch(e){setSyncStatus('err','删除失败');}
}

// ===== UI LOGIC =====
function setSyncStatus(s,t){
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(dot && txt) { dot.className='sync-dot '+s; txt.textContent=t; }
}
function today(){return new Date().toISOString().split('T')[0];}
function fmt(d){if(!d)return'';const p=d.split('-');return p[0]+'年'+p[1]+'月'+p[2]+'日';}

// ===== 书架流主渲染引擎 =====
function renderShelf(){
  const searchQ=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  const shelfContainer=document.getElementById('shelfShelves');
  const emptyState=document.getElementById('emptyState');
  const subtitle=document.getElementById('subtitle');
  
  if(!shelfContainer) return;
  shelfContainer.innerHTML='';
  
  if(entries.length===0){
    if(emptyState) emptyState.style.display='block';
    if(subtitle) subtitle.textContent='还没有时光手帐';
    return;
  }
  if(emptyState) emptyState.style.display='none';
  if(subtitle) subtitle.textContent=`共藏有 ${entries.length} 个瞬间`;

  const filteredEntries=entries.filter(e=>(e.title+e.text+e.tags.join(',')).toLowerCase().includes(searchQ));

  const categoryMap={};
  categoryMap['💖 全部时光手帐']=[...filteredEntries];

  filteredEntries.forEach(entry=>{
    if(entry.tags && entry.tags.length){
      entry.tags.forEach(t=>{
        if(!t)return;
        const key=`📂 ${t} 合集`;
        if(!categoryMap[key]) categoryMap[key]=[];
        categoryMap[key].push(entry);
      });
    }
  });

  Object.keys(categoryMap).forEach(categoryName=>{
    const categoryList=categoryMap[categoryName].sort((a,b)=>b.date.localeCompare(a.date));
    if(categoryList.length===0) return;

    const shelfSection=document.createElement('div');
    shelfSection.className='shelf-section';
    shelfSection.innerHTML=`<div class="shelf-title">${categoryName} <span>${categoryList.length}篇瞬间</span></div>`;

    const gridBooks=document.createElement('div');
    gridBooks.className='grid-books';

    categoryList.forEach((entry, idx)=>{
      const bookContainer=document.createElement('div');
      bookContainer.className='book-container';
      bookContainer.onclick=()=>openBook3D(categoryName, categoryList, idx);

      const coverImgSrc = entry.img ? entry.img : null;
      const cleanTagName = categoryName.replace('📂 ', '').replace(' 合集', '');

      bookContainer.innerHTML = `
        <div class="book-3d">
          <div class="b-face b-cover-top ${coverImgSrc ? '' : 'no-photo-bg'}">
            ${coverImgSrc ? `<img class="b-cover-img-bg" src="${coverImgSrc}">` : ''}
            <span class="b-cover-tag-badge">${cleanTagName}</span>
          </div>
          <div class="b-face b-cover-bottom">
            <div class="b-cover-title">${entry.title||'未命名瞬间'}</div>
            <div class="b-cover-footer">
              <span>📖 翻阅手帐</span>
              <span>${entry.date.substring(5)}</span>
            </div>
          </div>
          <div class="b-face b-spine"></div>
          <div class="b-face b-page-stack"></div>
        </div>
        <div class="book-actions">
          <button class="action-btn-sm" onclick="event.stopPropagation();editEntry('${entry.id}')">✏️ 改写</button>
          <button class="action-btn-sm btn-del" onclick="event.stopPropagation();deleteEntry('${entry.id}')">🗑️ 抹去</button>
        </div>
      `;
      gridBooks.appendChild(bookContainer);
    });

    shelfSection.appendChild(gridBooks);
    shelfContainer.appendChild(shelfSection);
  });
}

// ===== 3D 实感硬书双面渲染核心引擎 =====
function openBook3D(title, list, startIdx){
  if(!list || list.length === 0) return;
  
  const bookEl=document.getElementById('realBookElement');
  if(!bookEl) return;
  bookEl.innerHTML='';
  bookEl.classList.remove('is-opened');

  const coverPaper=document.createElement('div');
  coverPaper.className='paper-page';
  coverPaper.innerHTML = `
    <div class="page-face face-front p-cover-front">
      <div class="p-cover-front-content">
        <div class="c-icon">🌸</div>
        <h2>${title}</h2>
        <p>珍藏了 ${list.length} 个瞬间</p>
        <div style="font-size:11px; opacity:0.8; margin-top:24px;">点击右侧物理纸缘向后看</div>
      </div>
    </div>
    <div class="page-face face-back">
      <div class="p-inner" style="justify-content:center; text-align:center; background:#fffdfd; border-right:1px solid #ffdcd0;">
        <div style="color:var(--text3); font-size:13px; font-family:'Noto Serif SC',serif; letter-spacing:0.04em;">🌸 正在拉开时光手帐</div>
      </div>
    </div>
  `;
  bookEl.appendChild(coverPaper);

  let paperCount = 1; 
  for(let i = 0; i < list.length; i += 2){
    const rightEntry = list[i];       
    const leftEntry = list[i + 1];   
    
    const pageNode=document.createElement('div');
    pageNode.className='paper-page';
    paperCount++;

    pageNode.innerHTML = `
      <div class="page-face face-front">
        ${buildInnerPageHTML(rightEntry, i + 1)}
      </div>
      <div class="page-face face-back">
        ${leftEntry ? buildInnerPageHTML(leftEntry, i + 2) : `
          <div class="p-inner" style="justify-content:center; text-align:center; background:#fffdfd;">
            <div style="color:var(--text3); font-size:13px; font-family:'Noto Serif SC',serif;">🌸 记录爱，留住爱 · 期待下一次心动</div>
          </div>
        `}
      </div>
    `;
    bookEl.appendChild(pageNode);
  }

  currentBookPagesCount = paperCount;

  const allPages=bookEl.querySelectorAll('.paper-page');
  allPages.forEach((page, pIdx)=>{
    page.onclick=(evt)=>{
      const rect = page.getBoundingClientRect();
      const clickX = evt.clientX - rect.left;
      if(clickX > rect.width / 2){
        turnPage3D(1);
      } else {
        turnPage3D(-1);
      }
    };
  });

  document.getElementById('bookOverlay').style.display='flex';
  document.body.style.overflow='hidden';

  currentFlipIndex=0;
  updatePagesVisualStatus();
  
  if(startIdx >= 0){
    const targetPaperIndex = Math.floor(startIdx / 2) + 1;
    setTimeout(()=>{
      for(let k=0; k < targetPaperIndex; k++){
         turnPage3D(1);
      }
    },220);
  }
}

function buildInnerPageHTML(entry, pageNum) {
  if(!entry) return '';
  return `
    <div class="p-inner">
      ${entry.img ? `<img class="p-img" src="${entry.img}">` : `<div class="p-img-ph">💝</div>`}
      <div class="p-date">${fmt(entry.date)}</div>
      <div class="p-title">${entry.title||'未命名瞬间'}</div>
      <div class="p-scroll">
        <div class="p-text">${entry.text.replace(/\n/g,'<br>')}</div>
      </div>
      ${entry.tags.length ? `<div class="p-tags">${entry.tags.map(t=>`<span class="p-tag">${t}</span>`).join('')}</div>` : ''}
      <div class="p-num">${pageNum}</div>
    </div>
  `;
}

function updatePagesVisualStatus(){
  const bookEl=document.getElementById('realBookElement');
  if(!bookEl) return;
  const pages=bookEl.querySelectorAll('.paper-page');
  if(!pages.length) return;
  
  if(currentFlipIndex > 0){
    bookEl.classList.add('is-opened');
  } else {
    bookEl.classList.remove('is-opened');
  }

  pages.forEach((page, idx)=>{
    if(idx < currentFlipIndex){
      page.classList.add('flipped');
      page.style.zIndex = 10 + idx;
    } else {
      page.classList.remove('flipped');
      page.style.zIndex = 100 - idx;
    }
    
    if(idx === currentFlipIndex || idx === currentFlipIndex - 1){
      page.classList.add('active-flip');
    } else {
      page.classList.remove('active-flip');
    }
  });

  bookEl.querySelectorAll('.p-img').forEach(img=>{
     img.style.cursor='zoom-in';
     img.onclick=(e)=>{
       e.stopPropagation();
       document.getElementById('imgZoomSrc').src=img.src;
       document.getElementById('imgZoom').style.display='flex';
     };
  });

  const pageCounter = document.getElementById('bookPageCounter3D');
  if(pageCounter) pageCounter.textContent = `第 ${currentFlipIndex + 1} / ${currentBookPagesCount} 叠回忆`;
  
  const btnPrev = document.getElementById('btnPrev3D');
  const btnNext = document.getElementById('btnNext3D');
  if(btnPrev) btnPrev.disabled = currentFlipIndex === 0;
  if(btnNext) btnNext.disabled = currentFlipIndex === pages.length - 1;
}

function turnPage3D(dir){
  const bookEl=document.getElementById('realBookElement');
  if(!bookEl) return;
  const pages=bookEl.querySelectorAll('.paper-page');
  const newIndex = currentFlipIndex + dir;
  if(newIndex < 0 || newIndex >= pages.length) return;
  
  currentFlipIndex = newIndex;
  updatePagesVisualStatus();
}

function closeBook(){
  document.getElementById('bookOverlay').style.display='none';
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{
  if(document.getElementById('bookOverlay').style.display==='none')return;
  if(e.key==='ArrowRight') turnPage3D(1);
  if(e.key==='ArrowLeft') turnPage3D(-1);
  if(e.key==='Escape') closeBook();
});

// ===== EDIT AREAS =====
function openPassphrase(){
  document.getElementById('passphraseInput').value=passphrase||'';
  document.getElementById('passphraseModal').style.display='flex';
}
function confirmPassphrase(){
  const val=document.getElementById('passphraseInput').value.trim();
  if(!val){alert('请输入恋爱暗号哦');return;}
  passphrase=val;localStorage.setItem('diary_passphrase',passphrase);
  closeModal('passphraseModal');
  loadFromCloud();
}
function openNew(){
  editId=null;imgData=null;
  document.getElementById('titleInput').value='';
  document.getElementById('dateInput').value=today();
  document.getElementById('textInput').value='';
  document.getElementById('tagsInput').value='';
  document.getElementById('imgPreview').src='';
  document.getElementById('previewWrap').style.display='none';
  document.getElementById('uploadArea').style.display='block';
  document.getElementById('imgInput').value='';
  document.getElementById('compressHint').style.display='none';
  document.getElementById('modalTitle').textContent='记录新的甜蜜瞬间';
  document.getElementById('editModal').style.display='flex';
}
function editEntry(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editId=id;imgData=e.img||null;
  document.getElementById('titleInput').value=e.title||'';
  document.getElementById('dateInput').value=e.date||today();
  document.getElementById('textInput').value=e.text||'';
  document.getElementById('tagsInput').value=(e.tags||[]).join(', ');
  document.getElementById('compressHint').style.display='none';
  if(e.img){document.getElementById('imgPreview').src=e.img;document.getElementById('previewWrap').style.display='block';document.getElementById('uploadArea').style.display='none';}
  else{document.getElementById('previewWrap').style.display='none';document.getElementById('uploadArea').style.display='block';}
  document.getElementById('modalTitle').textContent='重写这段时光';
  document.getElementById('editModal').style.display='flex';
}
function removeImg(){imgData=null;document.getElementById('imgPreview').src='';document.getElementById('previewWrap').style.display='none';document.getElementById('uploadArea').style.display='block';document.getElementById('compressHint').style.display='none';}

async function deleteEntry(id){
  if(!confirm('确定要从这个世界上抹去这段甜蜜回忆吗？'))return;
  entries=entries.filter(x=>x.id!==id);renderShelf();
  await deleteFromCloud(id);
}

function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.src=ev.target.result;
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let width=img.width; let height=img.height;
      const MAX_WIDTH=1024;
      if(width>MAX_WIDTH){ height=Math.round((height*MAX_WIDTH)/width); width=MAX_WIDTH; }
      canvas.width=width; canvas.height=height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,width,height);
      imgData=canvas.toDataURL('image/jpeg',0.8);
      document.getElementById('imgPreview').src=imgData;
      document.getElementById('previewWrap').style.display='block';
      document.getElementById('uploadArea').style.display='none';
      document.getElementById('compressHint').style.display='block';
    };
  };
  reader.readAsDataURL(file);
}

async function saveEntry(){
  const title=document.getElementById('titleInput').value.trim();
  const date=document.getElementById('dateInput').value||today();
  const text=document.getElementById('textInput').value.trim();
  const tagsRaw=document.getElementById('tagsInput').value.trim();
  const tags=tagsRaw?tagsRaw.split(',').map(t=>t.trim()).filter(Boolean):[];
  
  if(!title&&!imgData&&!text){alert('不能保存完全空白的内容哦~');return;}
  const entry={id:editId||Date.now().toString(),title,date,text,tags,img:imgData};
  
  if(editId){const i=entries.findIndex(x=>x.id===editId);if(i>=0)entries[i]=entry;}
  else entries.unshift(entry);
  
  closeModal('editModal');
  renderShelf();
  await upsertEntry(entry);
}
function closeModal(id){document.getElementById(id).style.display='none';}
function overlayClose(e,id){if(e.target===document.getElementById(id))closeModal(id);}

// ===== 启动生命周期 =====
(async function init(){
  const saved=localStorage.getItem('diary_passphrase');
  if(saved){
    passphrase=saved;
    await loadFromCloud();
  } else {
    hideLoading();
    openPassphrase();
  }
})();
</script>
